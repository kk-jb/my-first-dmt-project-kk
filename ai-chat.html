<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的AI聊天助手</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .chat-container {
            width: 90%;
            max-width: 600px;
            height: 80vh;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 16px;
            background-color: #4299e1;
            color: white;
            border-radius: 12px 12px 0 0;
            font-size: 18px;
            font-weight: bold;
        }
        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            line-height: 1.5;
        }
        .user-message {
            background-color: #4299e1;
            color: white;
            align-self: flex-end;
        }
        .ai-message {
            background-color: #e2e8f0;
            color: #2d3748;
            align-self: flex-start;
        }
        .chat-input-area {
            display: flex;
            padding: 16px;
            border-top: 1px solid #e2e8f0;
        }
        #userInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
        }
        #sendBtn {
            margin-left: 12px;
            padding: 12px 24px;
            background-color: #4299e1;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        #sendBtn:hover {
            background-color: #3182ce;
        }
        #sendBtn:disabled {
            background-color: #a0aec0;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">我的AI聊天助手</div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="输入你的问题..." autocomplete="off">
            <button id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        // 配置：已填入你的专属信息
        const API_KEY = '517a33f5-d1d2-4c82-b8f6-a370713301f3';
        const API_URL = 'https://ark.cn-beijing.volces.com/api/v3/chat/completions';
        const MODEL_ID = 'doubao-seed-1-8-251228';

        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // 添加消息到聊天框
        function addMessage(content, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            messageDiv.textContent = content;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // 发送消息到AI
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            userInput.value = '';
            sendBtn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: MODEL_ID,
                        messages: [{ role: 'user', content: text }]
                    })
                });

                if (!response.ok) throw new Error(`网络错误: ${response.status}`);
                const data = await response.json();
                addMessage(data.choices[0].message.content, false);
            } catch (error) {
                console.error('错误:', error);
                addMessage('抱歉，请求失败。请检查网络或密钥是否正确。', false);
            } finally {
                sendBtn.disabled = false;
            }
        }

        // 绑定事件
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => e.key === 'Enter' && sendMessage());
        
        // 初始问候
        addMessage('你好！我是你的专属AI助手，有什么可以帮你的吗？', false);
    </script>
</body>
</html>
